<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Yönlendiriliyor...</title>
    <script>
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");
      if (token) {
        // Uygulamayı açacak deep link
        window.location.href = `studybuddy://resetpassword?token=${token}`;
      } else {
        document.write("Token bulunamadı");
      }
    </script>
  </head>
  <body>
    Uygulama yönlendiriliyor...
  </body>
</html>
